<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Doctor RAG Review</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f6f7f9; color: #202124; }
    main { width: min(920px, 100%); margin: 0 auto; padding: 28px 20px 40px; }
    h1 { margin: 0 0 8px; font-size: 30px; line-height: 1.15; }
    h2 { margin: 0 0 12px; font-size: 20px; }
    p { color: #555; line-height: 1.5; }
    .examples { display: flex; flex-wrap: wrap; gap: 8px; margin: 18px 0; }
    .examples button { background: #e8f0fe; color: #174ea6; }
    textarea { width: 100%; min-height: 128px; border: 1px solid #c8ccd1; border-radius: 8px; padding: 12px; font-size: 16px; line-height: 1.45; resize: vertical; }
    button { min-height: 42px; border: 0; border-radius: 7px; background: #1a73e8; color: white; padding: 10px 16px; font-size: 15px; cursor: pointer; }
    button:disabled { background: #9bbcf1; cursor: wait; }
    .ask-row { margin: 12px 0 0; }
    section { margin-top: 22px; background: white; border: 1px solid #dde1e6; border-radius: 8px; padding: 18px; }
    .answer { white-space: pre-wrap; line-height: 1.55; overflow-wrap: anywhere; }
    .meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 8px; margin-top: 16px; font-size: 14px; }
    .pill { background: #eef2f7; border-radius: 999px; padding: 7px 10px; overflow-wrap: anywhere; min-width: 0; }
    a { color: #0b57d0; overflow-wrap: anywhere; }
    @media (max-width: 640px) {
      main { padding: 22px 14px 32px; }
      h1 { font-size: 24px; }
      p { font-size: 15px; }
      .examples { display: grid; grid-template-columns: 1fr; }
      .examples button, .ask-row button { width: 100%; }
      textarea { min-height: 150px; }
      section { padding: 14px; }
      .meta { grid-template-columns: 1fr; }
      .pill { border-radius: 8px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Doctor RAG Review</h1>
    <p>Ask a patient-style question. The demo answers from the approved clinic corpus using metadata filtering, Vertex embeddings, and hybrid retrieval.</p>
    <div class="examples">
      <button type="button" onclick="setQuestion('Do you provide IVF and ICSI treatment?')">IVF / ICSI</button>
      <button type="button" onclick="setQuestion('Can Dr Madhu help with PCOS and endometriosis?')">PCOS</button>
      <button type="button" onclick="setQuestion('I want fertility preservation options')">Fertility preservation</button>
    </div>
    <textarea id="question" placeholder="Type a question for review..."></textarea>
    <p class="ask-row"><button id="ask" type="button" onclick="askQuestion()">Ask</button></p>
    <section id="result" hidden>
      <h2>Answer</h2>
      <div id="answer" class="answer"></div>
      <div class="meta">
        <div class="pill">Document: <span id="doc"></span></div>
        <div class="pill">Mode: <span id="mode"></span></div>
        <div class="pill">Filter: <span id="filter"></span></div>
        <div class="pill">Score: <span id="score"></span></div>
        <div class="pill">Source: <a id="source" target="_blank" rel="noreferrer"></a></div>
      </div>
    </section>
  </main>
  <script>
    function setQuestion(text) { document.getElementById('question').value = text; document.getElementById('question').focus(); }
    async function askQuestion() {
      const question = document.getElementById('question').value.trim();
      if (!question) return;
      const button = document.getElementById('ask');
      button.disabled = true;
      button.textContent = 'Checking...';
      try {
        const response = await fetch('/api/chat', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({question})});
        const payload = await response.json();
        const retrieval = payload.retrieval || {};
        document.getElementById('answer').textContent = payload.answer || JSON.stringify(payload, null, 2);
        document.getElementById('doc').textContent = retrieval.doc_id || '';
        document.getElementById('mode').textContent = retrieval.mode || '';
        document.getElementById('filter').textContent = retrieval.filter_mode || '';
        document.getElementById('score').textContent = retrieval.score || '';
        const source = document.getElementById('source');
        source.href = retrieval.url || '#';
        source.textContent = retrieval.url || '';
        document.getElementById('result').hidden = false;
      } catch (error) {
        document.getElementById('answer').textContent = String(error);
        document.getElementById('result').hidden = false;
      } finally {
        button.disabled = false;
        button.textContent = 'Ask';
      }
    }
  </script>
</body>
</html>
